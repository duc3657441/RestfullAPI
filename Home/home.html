<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Book Store</title>
    <style>
        
    </style>
</head>
<body>
    <!-- Thanh nav -->
    <div class="nav-bar">
        <div class="logo"><a href="home.html"><img src="../static/logo.png" alt="Logo" ></a></div>
        <div class="search">
            <input type="search" id="search" placeholder="Search..." /> 
            <span class="icon"><i class="fa fa-search"></i></span>
        </div>
        <div class="menu">
            <a href="#categories">Categories</a>
            <a href="#best-sellers">Best Sellers</a>
            <a href="#new-arrivals">New Arrivals</a>
            <a class="login-link" onclick="showLoginForm()" href="#">Log In</a>
            <a href="#contact">Contact</a>   
        </div>
    </div>
    <!-- Form login -->
    <div class="login-form-wrapper" id="loginFormWrapper" onclick="hideLoginForm(event)">
        <div class="login-form" onclick="event.stopPropagation()">
            <h2>Đăng nhập</h2>
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="" required>
                <label for="username">Tên đăng nhập</label>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="" required>
                <label for="password">Mật khẩu</label>
            </div>
            <div class="form-group">
                <button type="submit">Đăng nhập</button>
            </div>
             <div class="forgot-password">
                <a href="#">Quên mật khẩu?</a>
            </div>
            <div class="or-divider">hoặc</div>
            <a href="#" class="create-account-button">Tạo tài khoản mới</a>
        </div>
    </div>

    <script>
        function showLoginForm() {
            document.getElementById('loginFormWrapper').style.display = 'flex';
        }
        function hideLoginForm(event) {
            if (event.target.id === 'loginFormWrapper') {
                document.getElementById('loginFormWrapper').style.display = 'none';
            }
        }
    </script>
    <!-- end login -->
   <div class="body">
        <div class="">

        </div>
   </div>

</body>
</html>
